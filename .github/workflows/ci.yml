name: Build and Test

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Type check
        run: yarn type-check

      - name: Lint
        run: yarn lint

      - name: Build extension
        run: yarn build

      - name: Validate version consistency
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch: package.json has $PACKAGE_VERSION but git tag is $TAG_VERSION"
            exit 1
          else
            echo "✅ Version consistency check passed: $PACKAGE_VERSION"
          fi

      - name: Create extension zip for release
        if: startsWith(github.ref, 'refs/tags/v')
        id: create_release_zip
        run: |
          cd dist
          zip -r ../aliasify-chrome-extension-${{ github.ref_name }}.zip .

      - name: Create GitHub Release
        if: steps.create_release_zip.conclusion == 'success'
        uses: softprops/action-gh-release@v2
        with:
          name: Aliasify ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            ## 🚀 Aliasify Chrome Extension ${{ github.ref_name }}

            ### Installation Instructions
            1. Download the `aliasify-chrome-extension-${{ github.ref_name }}.zip` file below
            2. Extract the zip file to a folder
            3. Open Chrome and navigate to `chrome://extensions/`
            4. Enable "Developer mode" using the toggle in the top right
            5. Click "Load unpacked" and select the extracted folder
            6. The Aliasify extension should now appear in your extensions!
          files: |
            aliasify-chrome-extension-${{ github.ref_name }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
